<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Viewer</title>
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; }
#msg {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  color: #888; font-family: Segoe UI, sans-serif; font-size: 13px;
  background: #1a1a1a; z-index: 10;
}
.spin {
  width: 30px; height: 30px; border: 3px solid #333;
  border-top-color: #E8192C; border-radius: 50%;
  animation: s .8s linear infinite;
}
@keyframes s { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="msg"><div class="spin" id="spin"></div><div id="txt">Loading…</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
  onload="loadExtras()" onerror="err('Three.js CDN failed')"></script>

<script>
function err(m) {
  document.getElementById('spin').style.display='none';
  document.getElementById('txt').textContent = m;
}

function loadExtras() {
  document.getElementById('txt').textContent = 'Loading loaders…';
  var s1 = document.createElement('script');
  s1.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js';
  s1.onerror = function() { err('OrbitControls CDN failed'); };
  s1.onload = function() {
    var s2 = document.createElement('script');
    s2.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
    s2.onerror = function() { err('GLTFLoader CDN failed'); };
    s2.onload = startViewer;
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

function startViewer() {
  document.getElementById('txt').textContent = 'Starting viewer…';

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);

  var camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.01, 100000);
  camera.position.set(30, 20, 30);

  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  var controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.AmbientLight(0xffffff, 0.9));
  var sun = new THREE.DirectionalLight(0xfff8f0, 1.0);
  sun.position.set(50, 100, 50);
  scene.add(sun);

  var grid = new THREE.GridHelper(500, 40, 0x333333, 0x222222);
  scene.add(grid);

  document.getElementById('txt').textContent = 'Loading model…';

  new THREE.GLTFLoader().load(
    'RIBEIRO.glb',
    function(gltf) {
      var mat = new THREE.MeshLambertMaterial({ color: 0xC8B89A, side: THREE.DoubleSide });
      gltf.scene.traverse(function(o) { if (o.isMesh) o.material = mat; });
      scene.add(gltf.scene);

      var box    = new THREE.Box3().setFromObject(gltf.scene);
      var center = box.getCenter(new THREE.Vector3());
      var size   = box.getSize(new THREE.Vector3());
      var d      = Math.max(size.x, size.y, size.z);
      controls.target.copy(center);
      camera.position.set(center.x+d*1.2, center.y+d*0.8, center.z+d*1.2);
      controls.update();
      grid.position.y = box.min.y;
      document.getElementById('msg').style.display = 'none';
    },
    function(xhr) {
      if (xhr.total)
        document.getElementById('txt').textContent = 'Loading… ' + Math.round(xhr.loaded/xhr.total*100) + '%';
    },
    function(e) {
      err('Model error: ' + (e.message||String(e)));
    }
  );

  window.addEventListener('resize', function() {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  (function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();
}
</script>
</body>
</html>
