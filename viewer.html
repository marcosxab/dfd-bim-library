<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }
#loading {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  color: #888; font-family: Segoe UI, sans-serif; font-size: 13px;
  background: #111; z-index: 10;
}
.spin {
  width: 30px; height: 30px; border: 3px solid #333;
  border-top-color: #E8192C; border-radius: 50%;
  animation: s .8s linear infinite;
}
@keyframes s { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading">
  <div class="spin"></div>
  <div id="loadmsg">Starting viewer…</div>
</div>

<script>
// Dynamic import — no importmap needed
async function main() {
  const loadmsg = document.getElementById('loadmsg');
  const loading = document.getElementById('loading');

  try {
    loadmsg.textContent = 'Loading Three.js…';
    const THREE = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js');
    loadmsg.textContent = 'Loading GLTFLoader…';
    const { GLTFLoader } = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js');
    const { OrbitControls } = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js');

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    // Camera
    const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.01, 100000);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(100, 200, 100);
    scene.add(sun);

    // Grid
    const grid = new THREE.GridHelper(500, 40, 0x333333, 0x222222);
    scene.add(grid);

    // Load model
    loadmsg.textContent = 'Loading model…';
    new GLTFLoader().load(
      'RIBEIRO.glb',
      (gltf) => {
        scene.add(gltf.scene);
        const box    = new THREE.Box3().setFromObject(gltf.scene);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const d      = Math.max(size.x, size.y, size.z);
        controls.target.copy(center);
        camera.position.set(center.x + d, center.y + d*0.7, center.z + d);
        controls.update();
        grid.position.y = box.min.y;
        loading.style.display = 'none';
      },
      (xhr) => {
        if (xhr.total) loadmsg.textContent = 'Loading model ' + Math.round(xhr.loaded/xhr.total*100) + '%…';
      },
      (err) => {
        document.querySelector('.spin').style.display = 'none';
        loadmsg.textContent = 'Error: ' + (err.message || String(err));
      }
    );

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // Animate
    (function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();

  } catch(e) {
    document.querySelector('.spin').style.display = 'none';
    document.getElementById('loadmsg').textContent = 'Failed: ' + e.message;
    console.error(e);
  }
}
main();
</script>
</body>
</html>
