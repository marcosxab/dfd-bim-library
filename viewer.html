<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Viewer</title>
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; }
#msg {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  color: #888; font-family: Segoe UI, sans-serif; font-size: 13px;
  background: #1a1a1a; z-index: 10; padding: 20px; text-align: center;
}
.spin {
  width: 30px; height: 30px; border: 3px solid #333;
  border-top-color: #E8192C; border-radius: 50%;
  animation: s .8s linear infinite;
}
@keyframes s { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="msg">
  <div class="spin" id="spin"></div>
  <div id="txt">Checking model file…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/OrbitControls.js"></script>

<script>
var txt  = document.getElementById('txt');
var spin = document.getElementById('spin');
var msg  = document.getElementById('msg');

function showErr(m) {
  spin.style.display = 'none';
  txt.innerHTML = m;
}

// Step 1: fetch GLB manually to confirm it's accessible
txt.textContent = 'Checking RIBEIRO.glb…';
fetch('RIBEIRO.glb')
  .then(function(r) {
    if (!r.ok) { showErr('File error: HTTP ' + r.status + '<br>RIBEIRO.glb not found on server'); return; }
    var size = r.headers.get('content-length');
    txt.textContent = 'File OK (' + (size ? Math.round(size/1024) + ' KB' : '?') + ') — parsing…';
    return r.arrayBuffer();
  })
  .then(function(buf) {
    if (!buf) return;
    txt.textContent = 'Parsing GLB (' + Math.round(buf.byteLength/1024) + ' KB)…';

    // Step 2: load GLTFLoader from same CDN
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/loaders/GLTFLoader.js';
    s.onerror = function() {
      // GLTFLoader not on cdnjs — try jsdelivr
      var s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
      s2.onerror = function() { showErr('GLTFLoader failed to load from both CDNs'); };
      s2.onload  = function() { parseGLB(buf); };
      document.head.appendChild(s2);
    };
    s.onload = function() { parseGLB(buf); };
    document.head.appendChild(s);
  })
  .catch(function(e) {
    showErr('Fetch failed: ' + e.message + '<br><small>This usually means the file is not in the repository.</small>');
  });

function parseGLB(buf) {
  txt.textContent = 'Building scene…';

  if (!THREE.GLTFLoader) {
    showErr('THREE.GLTFLoader not available — CDN issue');
    return;
  }

  var loader = new THREE.GLTFLoader();
  loader.parse(buf, '', function(gltf) {
    startScene(gltf);
  }, function(e) {
    showErr('GLB parse error: ' + (e.message || String(e)));
  });
}

function startScene(gltf) {
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);

  var camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.01, 100000);
  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  var controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.AmbientLight(0xffffff, 0.9));
  var sun = new THREE.DirectionalLight(0xfff8f0, 1.0);
  sun.position.set(50, 100, 50);
  scene.add(sun);
  scene.add(new THREE.GridHelper(500, 40, 0x333333, 0x222222));

  var mat = new THREE.MeshLambertMaterial({ color: 0xC8B89A, side: THREE.DoubleSide });
  gltf.scene.traverse(function(o) { if (o.isMesh) o.material = mat; });
  scene.add(gltf.scene);

  var box    = new THREE.Box3().setFromObject(gltf.scene);
  var center = box.getCenter(new THREE.Vector3());
  var size   = box.getSize(new THREE.Vector3());
  var d      = Math.max(size.x, size.y, size.z);
  controls.target.copy(center);
  camera.position.set(center.x + d*1.2, center.y + d*0.8, center.z + d*1.2);
  controls.update();

  msg.style.display = 'none';

  window.addEventListener('resize', function() {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  (function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();
}
</script>
</body>
</html>
