<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Viewer</title>
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; }
#msg {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  color: #888; font-family: Segoe UI, sans-serif; font-size: 13px;
  background: #1a1a1a; z-index: 10;
}
.spin { width:30px; height:30px; border:3px solid #333;
  border-top-color:#E8192C; border-radius:50%;
  animation:s .8s linear infinite; }
@keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="msg"><div class="spin" id="spin"></div><div id="txt">Loading…</div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
var txt  = document.getElementById('txt');
var spin = document.getElementById('spin');
var msg  = document.getElementById('msg');
var allMeshes = [];
var originalMaterials = new Map();

function die(m) { spin.style.display='none'; txt.innerHTML=m; }

window.addEventListener('load', function() {
  if (!THREE)               return die('THREE not loaded');
  if (!THREE.OrbitControls) return die('OrbitControls not loaded');
  if (!THREE.GLTFLoader)    return die('GLTFLoader not loaded');

  txt.textContent = 'Fetching model…';

  fetch('RIBEIRO.glb')
    .then(function(r) {
      if (!r.ok) return die('HTTP '+r.status+' — RIBEIRO.glb not found');
      txt.textContent = 'Parsing…';
      return r.arrayBuffer();
    })
    .then(function(buf) {
      new THREE.GLTFLoader().parse(buf, '', build, function(e){ die('Parse error: '+(e.message||e)); });
    })
    .catch(function(e){ die('Fetch error: '+e.message); });
});

function build(gltf) {
  var scene    = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);
  var camera   = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.01, 100000);
  var renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  document.body.appendChild(renderer.domElement);

  var controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.AmbientLight(0xffffff, 0.9));
  var sun = new THREE.DirectionalLight(0xfffaf0, 1.0);
  sun.position.set(50,100,50);
  scene.add(sun);
  scene.add(new THREE.GridHelper(500,40,0x333333,0x222222));

  scene.add(gltf.scene);

  // Store all meshes and their original materials for highlight/reset
  gltf.scene.traverse(function(o) {
    if (o.isMesh) {
      allMeshes.push(o);
      originalMaterials.set(o.uuid, o.material.clone());
    }
  });

  var box    = new THREE.Box3().setFromObject(gltf.scene);
  var center = box.getCenter(new THREE.Vector3());
  var size   = box.getSize(new THREE.Vector3());
  var d      = Math.max(size.x, size.y, size.z);
  controls.target.copy(center);
  camera.position.set(center.x+d*1.5, center.y+d*0.9, center.z+d*1.5);
  controls.update();

  msg.style.display = 'none';

  // Listen for highlight/reset messages from the parent page
  window.addEventListener('message', function(ev) {
    if (!ev.data || !ev.data.type) return;

    if (ev.data.type === 'highlight') {
      var name = ev.data.name;
      allMeshes.forEach(function(m) {
        // Match by node name or parent node name
        var nodeMatch = (m.name === name) || (m.parent && m.parent.name === name);
        if (nodeMatch) {
          // Highlighted: full opacity + orange emissive glow
          var mat = originalMaterials.get(m.uuid).clone();
          mat.transparent = false;
          mat.opacity = 1.0;
          mat.emissive = new THREE.Color(0.3, 0.12, 0.0);
          m.material = mat;
        } else {
          // Others: dark and transparent
          var mat = originalMaterials.get(m.uuid).clone();
          mat.transparent = true;
          mat.opacity = 0.12;
          mat.emissive = new THREE.Color(0, 0, 0);
          m.material = mat;
        }
      });
    }

    if (ev.data.type === 'reset') {
      allMeshes.forEach(function(m) {
        m.material = originalMaterials.get(m.uuid).clone();
      });
    }
  });

  window.addEventListener('resize', function(){
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  (function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene,camera); })();
}
</script>
</body>
</html>
